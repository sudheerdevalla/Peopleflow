<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Employee</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background: #343a40;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            color: white;
            display: block;
            margin: 15px 0;
            text-decoration: none;
        }
        .sidebar a:hover {
            color: #0d6efd;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4>HR Portal</h4>
            <a href="/admin/dashboard">🏠 Dashboard</a>
            <a href="/admin/employees">👨‍💼 Employees</a>
            <a href="/admin/attendance">📅 Attendance</a>
            <a href="/logout">🚪 Logout</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <h2 class="mb-4">Add New Employee</h2>

            <div class="card shadow p-4" style="max-width:600px;">

                <form th:action="@{/admin/save-employee}" th:object="${employee}" method="post">

                    <div class="mb-3">
                        <label class="form-label">Employee Name</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Enter name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Salary</label>
                        <input type="number" th:field="*{basicSalary}" class="form-control" placeholder="Enter salary" required>
                    </div>
					<div class="mb-3">
					    <label>Status</label>
					    <select th:field="*{status}" class="form-control">
					        <option value="Active">Active</option>
					        <option value="Inactive">Inactive</option>
					    </select>
					</div>


                    <div class="d-flex justify-content-between">
                        <a href="/admin/employees" class="btn btn-secondary">⬅ Back</a>
                        <button type="submit" class="btn btn-success">💾 Save</button>
                    </div>

                </form>

            </div>

        </div>

    </div>
</div>

</body>
</html>
