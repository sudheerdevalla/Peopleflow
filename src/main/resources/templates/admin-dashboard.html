<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
background-color: #f4f6f9;
}

.sidebar {
height: 100vh;
background: #212529;
color: white;
padding: 20px;
}

.sidebar h4 {
margin-bottom: 30px;
}

.sidebar a {
color: white;
display: block;
margin: 15px 0;
text-decoration: none;
font-size: 16px;
}

.sidebar a:hover {
color: #0d6efd;
}

.card {
border-radius: 15px;
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->
<div class="col-md-3 col-lg-2 sidebar">
<h4>HR Portal</h4>

<a href="/admin/dashboard">🏠 Dashboard</a>
<a href="/admin/employees">👨‍💼 Employees</a>
<a href="/admin/attendance">📅 Attendance</a>
<a href="/logout">🚪 Logout</a>
</div>

<!-- Main Content -->
<div class="col-md-9 col-lg-10 p-4">

<h2 class="mb-4">Admin Dashboard</h2>

<div class="row">

<!-- Total Employees -->
<div class="col-md-4">
<div class="card shadow p-3 text-center">
<h5>Total Employees</h5>
<h2 th:text="${empCount}"></h2>
</div>
</div>

<!-- Manage Employees -->
<div class="col-md-4">
<div class="card shadow p-3 text-center">
<h5>Manage Employees</h5>
<a href="/admin/employees" class="btn btn-primary mt-2">Go</a>
</div>
</div>

<!-- Attendance -->
<div class="col-md-4">
<div class="card shadow p-3 text-center">
<h5>Attendance</h5>
<a href="/admin/attendance" class="btn btn-success mt-2">Go</a>
</div>
</div>

</div>

</div>
</div>
</div>
<div class="card shadow p-4 mt-4">

    <h5>Employee Chart</h5>

    <canvas id="employeeChart" height="100"></canvas>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const ctx = document.getElementById('employeeChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Employees'],
        datasets: [{
            label: 'Total Employees',
            data: [/*[[${empCount}]]*/],
            borderWidth: 1
        }]
    }
});
</script>
</body>
</html>
