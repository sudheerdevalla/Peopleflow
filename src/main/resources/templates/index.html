<!DOCTYPE html>
<html>
<head>
    <title>HR App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">HR Dashboard</span>
    </div>
</nav>

<div class="container">

    <h2 class="text-center mb-4">HR Management System</h2>

    <!-- Add Employee -->
    <div class="card p-3 mb-4 shadow">
        <h4>Add Employee</h4>
        <div class="row">
            <div class="col">
                <input type="text" id="name" class="form-control" placeholder="Name">
            </div>
            <div class="col">
                <input type="number" id="salary" class="form-control" placeholder="Salary">
            </div>
            <div class="col">
                <button class="btn btn-primary" onclick="addEmployee()">Add</button>
            </div>
        </div>
    </div>

    <!-- Employee Table -->
    <div class="card p-3 mb-4 shadow">
        <h4>Employees</h4>
        <button class="btn btn-success mb-2" onclick="getEmployees()">Load Employees</button>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Salary</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="empTable"></tbody>
        </table>
    </div>

    <!-- Payslip -->
    <div class="card p-3 shadow">
        <h4>Generate Payslip</h4>
        <div class="row mb-2">
            <div class="col">
                <input type="number" id="empId" class="form-control" placeholder="Employee ID">
            </div>
            <div class="col">
                <input type="number" id="leaves" class="form-control" placeholder="Leaves">
            </div>
            <div class="col">
                <button class="btn btn-warning" onclick="getPayslip()">Generate</button>
				<button class="btn btn-danger" onclick="downloadPDF()">Download PDF</button>
            </div>
        </div>

        <pre id="payslipResult" class="bg-dark text-white p-3"></pre>
    </div>

</div>

<script>

// ✅ ADD EMPLOYEE
function addEmployee() {
    let name = document.getElementById("name").value;
    let salary = document.getElementById("salary").value;

    fetch("/employees", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: name, salary: salary })
    })
    .then(res => res.json())
    .then(data => {
        alert("Employee Added!");
        getEmployees();
    });
}

// ✅ GET EMPLOYEES (TABLE)
function getEmployees() {
    fetch("/employees")
    .then(res => res.json())
    .then(data => {
        let table = document.getElementById("empTable");
        table.innerHTML = "";

        data.forEach(emp => {
            let row = `
                <tr>
                    <td>${emp.id}</td>
                    <td>${emp.name}</td>
                    <td>${emp.basicSalary}</td>
					
                    <td>
                        <button class="btn btn-sm btn-warning"
                            onclick="editEmployee(${emp.id}, '${emp.name}', ${emp.basicSalary})">
                            Edit
                        </button>

                        <button class="btn btn-sm btn-danger"
                            onclick="deleteEmployee(${emp.id})">
                            Delete
                        </button>
                    </td>
                </tr>
            `;
            table.innerHTML += row;
        });
    });
}
function downloadPDF() {
    let id = document.getElementById("empId").value;
    let leaves = document.getElementById("leaves").value;

    window.open(`/employees/payslip/pdf/${id}?leaves=${leaves}`);
}

// ✅ DELETE
function deleteEmployee(id) {
    fetch(`/employees/${id}`, {
        method: "DELETE"
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        getEmployees();
    });
}

// ✅ EDIT
function editEmployee(id, name, salary) {

    let newName = prompt("Enter new name:", name);
    let newSalary = prompt("Enter new salary:", salary);

    if (!newName || !newSalary) return;

    fetch(`/employees/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: newName,
            salary: parseFloat(newSalary)
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Employee Updated!");
        getEmployees();
    });
}

// ✅ PAYSLIP
function getPayslip() {
    let id = document.getElementById("empId").value;
    let leaves = document.getElementById("leaves").value;

    fetch(`/employees/${id}/payslip?leaves=${leaves}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("payslipResult").innerText =
            JSON.stringify(data, null, 2);
    });
}

</script>

</body>
</html>
